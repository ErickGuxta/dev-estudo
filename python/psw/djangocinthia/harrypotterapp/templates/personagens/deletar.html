{% extends "_base.html" %}

{% block content %}
<h1 class="h3 mb-3">Deletar personagem</h1>

<p>Tem certeza que deseja deletar o personagem <strong>{{ personagem.nome }}</strong>?</p>

<form action="" method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Deletar</button>
    <a href="{% url 'listar_personagens' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}

{% extends "_base.html" %}


{% block content %}
<section>
    <div class="hero-panel">
        <div class="hero-kicker mb-2">Pena Mágica</div>
        <h1 class="display-6 mb-2">Adicionar novo personagem</h1>
        <p class="mb-0" style="max-width: 42rem; color: rgba(247, 237, 215, 0.82);">Preencha a ficha como um registro antigo de Hogwarts, com visual mais artesanal e menos genérico.</p>
    </div>

    <div class="section-kicker mb-1">Cadastro</div>
    <h2 class="h4 content-title mb-3">Ficha do personagem</h2>

    <form action="" method="post" class="magic-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="action-row">
            <button type="submit" class="btn magic-btn">Criar personagem</button>
            <a href="{% url 'listar_personagens' %}" class="btn btn-outline-secondary">Voltar</a>
        </div>
    </form>
</section>
{% endblock %}

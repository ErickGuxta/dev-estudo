<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SavePet | Localização{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <style>
        :root {
            --bg-main: #f4f7fb;
            --bg-card: #ffffff;
            --bg-sidebar: #0f172a;
            --text-main: #1f2937;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --border-soft: #e5e7eb;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .layout-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-area {
            flex: 1;
        }

        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        {% include "_header_localizacao.html" %}

        <div class="container-fluid main-area">
            <div class="row g-0">
                {% include "_sidebar_localizacao.html" %}

                <main class="col-12 col-md-9 col-lg-10 p-4">
                    <div class="content-card">
                        {% block content %}{% endblock %}
                    </div>
                </main>
            </div>
        </div>

        {% include "_footer_localizacao.html" %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

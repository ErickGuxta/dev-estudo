{% extends "_base.html" %}

{% block title %}Nova Partida{% endblock %}

{% block content %}
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Cadastrar partida</h1>
            <p class="page-muted mb-0">Preencha os dados da partida de futmesa.</p>
        </div>
        <a href="{% url 'listar_partidas' %}" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <form method="post" class="form-area">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Salvar partida</button>
    </form>
</section>
{% endblock %}
